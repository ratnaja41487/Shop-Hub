<!DOCTYPE html>
<html lang="en">
<head>

    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lookbook | Men & women Fashion</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Inter:wght@400&display=swap');

<body class="bg-white">

    <!-- Simple Navigation Back -->

    <header class="text-center py-12">

    <!-- Masonry Grid Container -->
    <!-- Masonry Grid Container -->
<main class="max-w-[1400px] mx-auto p-4 md:p-10">

        <!-- Large Tall Image (Spans 2 rows) -->
        <div class="row-span-2 col-span-1 overflow-hidden group">
