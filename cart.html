<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Your Cart | ShopHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    </style>
</head>
<body class="p-4 md:p-12">

    <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-2xl p-6 md:p-10">
        <div class="flex justify-between items-center border-b pb-6 mb-6">
            <h1 class="text-3xl font-bold text-purple-700">Shopping Cart</h1>
            <a href="home.html" class="text-sm font-semibold text-gray-500 hover:text-purple-600">
                <i class="fas fa-arrow-left"></i> Back to Store
            </a>
        </div>

        <!-- Cart Items List -->
        <div id="cart-display">
            <!-- Items will appear here -->
        </div>

        <!-- Summary Section -->
        <div id="cart-summary" class="mt-8 pt-8 border-t hidden">
            <div class="flex justify-between items-center text-xl font-bold">
                <span>Total Amount:</span>
                <span class="text-purple-700">₹<span id="total-price">0</span></span>
            </div>
            <button class="w-full mt-6 bg-purple-600 text-white py-4 rounded-xl font-bold hover:bg-purple-700 transition-all shadow-md">
                Proceed to Checkout
            </button>
        </div>
    </div>

    <script>
        // Function to render the cart based on LocalStorage
        function renderCart() {
            const cartDisplay = document.getElementById('cart-display');
            const summary = document.getElementById('cart-summary');
            const totalPrice = document.getElementById('total-price');
            
            // Getting the cart from storage
            let cart = JSON.parse(localStorage.getItem('myShopCart')) || [];

            if (cart.length === 0) {
                cartDisplay.innerHTML = `
                    <div class="text-center py-20">
                        <i class="fas fa-shopping-cart text-gray-200 text-6xl mb-4"></i>
                        <p class="text-gray-500 text-lg">Your cart is currently empty.</p>
                    </div>`;
                summary.classList.add('hidden');
                return;
            }

            summary.classList.remove('hidden');
            cartDisplay.innerHTML = '';
            let total = 0;

            cart.forEach((item, index) => {
                total += parseFloat(item.price || 0);
                cartDisplay.innerHTML += `
                    <div class="flex items-center justify-between border-b py-4">
                        <div class="flex items-center gap-4">
                            <img src="${item.image}" class="w-16 h-16 object-cover rounded-lg">
                            <div>
                                <h3 class="font-bold text-gray-800">${item.name}</h3>
                                <p class="text-sm text-purple-600 font-semibold">₹${item.price}</p>
                            </div>
                        </div>
                        <button onclick="removeItem(${index})" class="text-red-400 hover:text-red-600">
                            <i class="fas fa-trash"></i>
                        </button>
                    </div>
                `;
            });

            totalPrice.innerText = total;
        }

        // Function to remove items
        window.removeItem = function(index) {
            let cart = JSON.parse(localStorage.getItem('myShopCart')) || [];
            cart.splice(index, 1);
            localStorage.setItem('myShopCart', JSON.stringify(cart));
            renderCart();
            
            // Optional: Update the badge count if you have a shared JS file
            // But since we aren't changing home.html, we just update the storage.
        };

        // Load cart on page start
        renderCart();
    </script>
</body>
</html>
