<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Search | ShopHub</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap');
    body { font-family: 'Inter', sans-serif; background-color: #f9fafb; }
    .product-card { transition: transform 0.2s, box-shadow 0.2s; }
    .product-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px rgba(0,0,0,0.1); }
    .filter-chip { border: 1.5px solid #e5e7eb; border-radius: 999px; padding: 6px 16px; font-size: 13px; cursor: pointer; transition: all 0.15s; }
    .filter-chip:hover { border-color: #7c3aed; color: #7c3aed; }
    .filter-chip.active { background: #7c3aed; color: white; border-color: #7c3aed; }
    .skeleton { background: linear-gradient(90deg, #f0f0f0 25%, #e8e8e8 50%, #f0f0f0 75%); background-size: 200% 100%; animation: shimmer 1.4s infinite; }
    @keyframes shimmer { from { background-position: 200% 0; } to { background-position: -200% 0; } }
  </style>
</head>
<body>

  <!-- Header -->
  <header class="bg-white border-b sticky top-0 z-50 shadow-sm">
    <div class="container mx-auto px-4 py-3 flex items-center justify-between gap-4">
      <a href="home.html" class="text-xl font-bold text-purple-700 flex items-center gap-2 flex-shrink-0">
        <i class="fas fa-shopping-bag"></i> ShopHub
      </a>

      <!-- Search Bar -->
      <div class="flex-1 max-w-2xl">
        <div class="flex items-center bg-gray-100 rounded-xl px-4 py-2.5 gap-3 border-2 border-transparent focus-within:border-purple-400 focus-within:bg-white transition-all">
          <i class="fas fa-search text-gray-400"></i>
          <input
            type="text"
            id="main-search"
            placeholder="Search for products, brands, categories..."
            class="bg-transparent flex-grow outline-none text-sm text-gray-800 placeholder-gray-400"
            autofocus
          >
          <button id="clear-btn" onclick="clearSearch()" class="hidden text-gray-400 hover:text-gray-600 transition-colors">
            <i class="fas fa-times"></i>
          </button>
        </div>
      </div>

      <div class="flex items-center gap-4 text-sm flex-shrink-0">
        <a href="cart.html" class="relative">
          <i class="fas fa-shopping-cart text-xl text-gray-600 hover:text-purple-600 transition-colors"></i>
          <span id="cart-badge" class="absolute -top-2 -right-2 bg-purple-600 text-white text-[10px] rounded-full h-4 w-4 flex items-center justify-center">0</span>
        </a>
      </div>
    </div>
  </header>

  <div class="container mx-auto px-4 py-6 max-w-6xl">

    <!-- Stats bar -->
    <div class="flex items-center justify-between mb-4">
      <p id="results-label" class="text-sm text-gray-500">
        Enter a search term to find products
      </p>
      <div class="flex items-center gap-2">
        <span class="text-xs text-gray-400">Sort by:</span>
        <select id="sort-select" onchange="applySort()" class="text-sm border border-gray-200 rounded-lg px-2 py-1 outline-none focus:border-purple-400">
          <option value="relevance">Relevance</option>
          <option value="price-asc">Price: Low to High</option>
          <option value="price-desc">Price: High to Low</option>
          <option value="name-asc">Name A-Z</option>
        </select>
      </div>
    </div>

    <!-- Category Filters -->
    <div class="flex flex-wrap gap-2 mb-6" id="filter-chips">
      <button class="filter-chip active" onclick="setFilter(this,'all')">All</button>
      <button class="filter-chip" onclick="setFilter(this,'Men')">Men</button>
      <button class="filter-chip" onclick="setFilter(this,'Women')">Women</button>
      <button class="filter-chip" onclick="setFilter(this,'Kids')">Kids</button>
      <button class="filter-chip" onclick="setFilter(this,'Electronics')">Electronics</button>
      <button class="filter-chip" onclick="setFilter(this,'Jewellery')">Jewellery</button>
      <button class="filter-chip" onclick="setFilter(this,'Footwear')">Footwear</button>
    </div>

    <!-- Recent Searches (shown when input is empty) -->
    <div id="recent-section">
      <div class="mb-6" id="recent-searches-wrap">
        <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Recent Searches</h3>
        <div id="recent-searches" class="flex flex-wrap gap-2"></div>
        <p id="no-recent" class="text-sm text-gray-400 hidden">No recent searches yet.</p>
      </div>

      <!-- Popular / Trending -->
      <h3 class="text-sm font-bold text-gray-500 uppercase mb-3">Trending Searches</h3>
      <div class="flex flex-wrap gap-2 mb-8">
        <button onclick="triggerSearch('shirts')" class="filter-chip">👕 Shirts</button>
        <button onclick="triggerSearch('shoes')" class="filter-chip">👟 Shoes</button>
        <button onclick="triggerSearch('mobile')" class="filter-chip">📱 Mobile</button>
        <button onclick="triggerSearch('watches')" class="filter-chip">⌚ Watches</button>
        <button onclick="triggerSearch('jacket')" class="filter-chip">🧥 Jackets</button>
        <button onclick="triggerSearch('saree')" class="filter-chip">👘 Sarees</button>
        <button onclick="triggerSearch('laptop')" class="filter-chip">💻 Laptops</button>
        <button onclick="triggerSearch('earrings')" class="filter-chip">💎 Earrings</button>
      </div>
    </div>

    <!-- Results Grid -->
    <div id="results-section" class="hidden">
      <div id="results-grid" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-4"></div>

      <!-- No results -->
      <div id="no-results" class="hidden text-center py-20">
        <div class="text-6xl mb-4">🔍</div>
        <h3 class="text-xl font-bold text-gray-700 mb-2">No results found</h3>
        <p class="text-gray-400 text-sm">Try different keywords or browse our categories</p>
        <div class="flex flex-wrap gap-2 justify-center mt-6">
          <a href="Men.html" class="filter-chip">Men's Fashion</a>
          <a href="women.html" class="filter-chip">Women's Fashion</a>
          <a href="Electronic.html" class="filter-chip">Electronics</a>
        </div>
      </div>
    </div>

  </div>

  <script>
    // ─── Product Catalog ───────────────────────────────────────────────────────
    // This is a static catalog matching the actual pages in the repo.
    // In a real setup this could be fetched from an API.
    const CATALOG = [
      // Men - Shirts
      { id: 's1', name: 'Beige Shirt', price: 799, category: 'Men', image: 'Assets/shirt1.webp', page: 'shirts.html' },
      { id: 's2', name: 'Classic White Shirt', price: 699, category: 'Men', image: 'Assets/shirt10.webp', page: 'shirts.html' },
      { id: 's3', name: 'Black Party Shirt', price: 999, category: 'Men', image: 'Assets/shirt11.webp', page: 'shirts.html' },
      { id: 's4', name: 'Black & White Flannel Shirt', price: 599, category: 'Men', image: 'Assets/shirt12.webp', page: 'shirts.html' },
      { id: 's5', name: 'Blue Striped Dress Shirt', price: 799, category: 'Men', image: 'Assets/shirt6.jpg', page: 'shirts.html' },
      { id: 's6', name: 'White Linen Overshirt', price: 589, category: 'Men', image: 'Assets/shirt4.jpg', page: 'shirts.html' },
      { id: 's7', name: 'Pastel Pink Summer Shirt', price: 699, category: 'Men', image: 'Assets/shirt8.webp', page: 'shirts.html' },
      { id: 's8', name: 'Midnight Navy Formal Shirt', price: 799, category: 'Men', image: 'Assets/shirt2.jpg', page: 'shirts.html' },
      // Men - Pants
      { id: 'p1', name: 'Black Slim Fit Pants', price: 999, category: 'Men', image: 'https://images.unsplash.com/photo-1542272604-787c3835535d?w=300&q=80', page: 'pant.html' },
      { id: 'p2', name: 'Khaki Chinos', price: 849, category: 'Men', image: 'https://images.unsplash.com/photo-1473966968600-fa801b869a1a?w=300&q=80', page: 'pant.html' },
      // Men - Casuals
      { id: 'c1', name: 'Casual Graphic Tee', price: 499, category: 'Men', image: 'https://images.unsplash.com/photo-1562157873-818bc0726f68?w=300&q=80', page: 'casuals.html' },
      { id: 'c2', name: 'Casual Polo Shirt', price: 649, category: 'Men', image: 'https://images.unsplash.com/photo-1571455786673-9d9d6c194f90?w=300&q=80', page: 'casuals.html' },
      // Jackets
      { id: 'j1', name: 'Leather Biker Jacket', price: 2499, category: 'Men', image: 'https://images.unsplash.com/photo-1551028719-00167b16eac5?w=300&q=80', page: 'jackets.html' },
      { id: 'j2', name: 'Denim Jacket', price: 1599, category: 'Men', image: 'https://images.unsplash.com/photo-1576871337622-98d48d1cf531?w=300&q=80', page: 'jackets.html' },
      { id: 'j3', name: 'Hooded Parka Jacket', price: 1999, category: 'Men', image: 'https://images.unsplash.com/photo-1544022613-e87ca75a784a?w=300&q=80', page: 'jackets.html' },
      // Shoes
      { id: 'sh1', name: 'White Sneakers', price: 1299, category: 'Footwear', image: 'https://images.unsplash.com/photo-1542291026-7eec264c27ff?w=300&q=80', page: 'shoes.html' },
      { id: 'sh2', name: 'Brown Leather Boots', price: 2199, category: 'Footwear', image: 'https://images.unsplash.com/photo-1608256246200-53e635b5b65f?w=300&q=80', page: 'shoes.html' },
      { id: 'sh3', name: 'Sports Running Shoes', price: 1799, category: 'Footwear', image: 'https://images.unsplash.com/photo-1606107557195-0e29a4b5b4aa?w=300&q=80', page: 'shoes.html' },
      // Sandals
      { id: 'sd1', name: 'Casual Flip Flops', price: 299, category: 'Footwear', image: 'https://images.unsplash.com/photo-1603487742131-4160ec999306?w=300&q=80', page: 'Sandles.html' },
      // Women
      { id: 'w1', name: 'Floral Summer Dress', price: 1299, category: 'Women', image: 'https://images.unsplash.com/photo-1496747611176-843222e1e57c?w=300&q=80', page: 'women.html' },
      { id: 'w2', name: 'Traditional Salwar Suit', price: 1599, category: 'Women', image: 'https://images.unsplash.com/photo-1583391733956-6c78276477e2?w=300&q=80', page: 'Traditionaldress.html' },
      { id: 'w3', name: 'Western Party Dress', price: 1899, category: 'Women', image: 'https://images.unsplash.com/photo-1515372039744-b8f02a3ae446?w=300&q=80', page: 'westrendress.html' },
      // Kids
      { id: 'k1', name: 'Kids Cartoon T-Shirt', price: 399, category: 'Kids', image: 'https://images.unsplash.com/photo-1567113463300-102a7eb3cb26?w=300&q=80', page: 'kids.html' },
      { id: 'k2', name: 'Boys Denim Shorts', price: 499, category: 'Kids', image: 'https://images.unsplash.com/photo-1518831959646-742c3a14ebf7?w=300&q=80', page: 'boys.html' },
      { id: 'k3', name: 'Girls Party Frock', price: 799, category: 'Kids', image: 'https://images.unsplash.com/photo-1471286174890-9c112ffca5b4?w=300&q=80', page: 'girls.html' },
      { id: 'k4', name: 'Kids Toy Set', price: 599, category: 'Kids', image: 'https://images.unsplash.com/photo-1594736797933-d0401ba2fe65?w=300&q=80', page: 'toys.html' },
      // Electronics
      { id: 'e1', name: 'Smartphone Pro Max', price: 24999, category: 'Electronics', image: 'https://images.unsplash.com/photo-1511707171634-5f897ff02aa9?w=300&q=80', page: 'mobile.html' },
      { id: 'e2', name: 'Wireless Earbuds', price: 1999, category: 'Electronics', image: 'https://images.unsplash.com/photo-1606220945770-b5b6c2c55bf1?w=300&q=80', page: 'earpods.html' },
      { id: 'e3', name: 'Smart LED TV 43"', price: 29999, category: 'Electronics', image: 'https://images.unsplash.com/photo-1593359677879-a4bb92f4e57b?w=300&q=80', page: 'tv.html' },
      { id: 'e4', name: 'Gaming Laptop', price: 59999, category: 'Electronics', image: 'https://images.unsplash.com/photo-1496181133206-80ce9b88a853?w=300&q=80', page: 'laptop.html' },
      { id: 'e5', name: 'Double Door Refrigerator', price: 35000, category: 'Electronics', image: 'https://images.unsplash.com/photo-1584568694244-14fbdf83bd30?w=300&q=80', page: 'fridge.html' },
      { id: 'e6', name: 'Split AC 1.5 Ton', price: 34999, category: 'Electronics', image: 'https://images.unsplash.com/photo-1581275655440-bf8bf0f24c4a?w=300&q=80', page: 'ac.html' },
      { id: 'e7', name: 'Mixer Grinder 750W', price: 2499, category: 'Electronics', image: 'https://images.unsplash.com/photo-1556909114-f6e7ad7d3136?w=300&q=80', page: 'mixer.html' },
      // Jewellery
      { id: 'jw1', name: 'Gold Necklace Set', price: 4999, category: 'Jewellery', image: 'https://images.unsplash.com/photo-1599643478518-a784e5dc4c8f?w=300&q=80', page: 'Jewellery.html' },
      { id: 'jw2', name: 'Diamond Earrings', price: 3499, category: 'Jewellery', image: 'https://images.unsplash.com/photo-1630019852942-f89202989a59?w=300&q=80', page: 'Jewellery.html' },
      { id: 'jw3', name: 'Silver Bracelet', price: 1299, category: 'Jewellery', image: 'https://images.unsplash.com/photo-1611085583191-a3b181a88401?w=300&q=80', page: 'Jewellery.html' },
      // Watches
      { id: 'wt1', name: 'Analog Classic Watch', price: 2999, category: 'Men', image: 'https://images.unsplash.com/photo-1523275335684-37898b6baf30?w=300&q=80', page: 'watches.html' },
      { id: 'wt2', name: 'Smart Fitness Watch', price: 4999, category: 'Electronics', image: 'https://images.unsplash.com/photo-1546868871-7041f2a55e12?w=300&q=80', page: 'watches.html' },
    ];

    let activeFilter = 'all';
    let currentResults = [];
    let currentQuery = '';

    // ─── Search Logic ──────────────────────────────────────────────────────────
    const input = document.getElementById('main-search');
    const clearBtn = document.getElementById('clear-btn');

    input.addEventListener('input', () => {
      const q = input.value.trim();
      clearBtn.classList.toggle('hidden', q.length === 0);
      if (q.length === 0) {
        showRecent();
      } else {
        performSearch(q);
      }
    });

    // Pre-fill query from URL param
    window.addEventListener('DOMContentLoaded', () => {
      const params = new URLSearchParams(window.location.search);
      const q = params.get('q');
      if (q) {
        input.value = q;
        clearBtn.classList.remove('hidden');
        performSearch(q);
      } else {
        showRecent();
      }
      updateCartBadge();
      renderRecentSearches();
    });

    function performSearch(query) {
      currentQuery = query;
      saveRecentSearch(query);

      document.getElementById('recent-section').classList.add('hidden');
      document.getElementById('results-section').classList.remove('hidden');

      let results = CATALOG.filter(p => {
        const matchesQuery = p.name.toLowerCase().includes(query.toLowerCase()) ||
                             p.category.toLowerCase().includes(query.toLowerCase());
        const matchesFilter = activeFilter === 'all' || p.category === activeFilter;
        return matchesQuery && matchesFilter;
      });

      currentResults = results;
      applySort();
    }

    function applySort() {
      const sort = document.getElementById('sort-select').value;
      let sorted = [...currentResults];
      if (sort === 'price-asc') sorted.sort((a, b) => a.price - b.price);
      else if (sort === 'price-desc') sorted.sort((a, b) => b.price - a.price);
      else if (sort === 'name-asc') sorted.sort((a, b) => a.name.localeCompare(b.name));

      renderResults(sorted);
    }

    function renderResults(results) {
      const grid = document.getElementById('results-grid');
      const noResults = document.getElementById('no-results');
      const label = document.getElementById('results-label');

      label.textContent = results.length > 0
        ? `${results.length} result${results.length > 1 ? 's' : ''} for "${currentQuery}"`
        : `No results for "${currentQuery}"`;

      if (results.length === 0) {
        grid.innerHTML = '';
        noResults.classList.remove('hidden');
        return;
      }

      noResults.classList.add('hidden');
      grid.innerHTML = results.map(p => `
        <div class="product-card bg-white rounded-2xl overflow-hidden shadow-sm cursor-pointer" onclick="window.location.href='${p.page}'">
          <div class="aspect-square bg-gray-100 overflow-hidden">
            <img src="${p.image}" alt="${p.name}" class="w-full h-full object-cover hover:scale-105 transition-transform duration-300"
              onerror="this.src='https://via.placeholder.com/300x300?text=Image'">
          </div>
          <div class="p-3">
            <span class="inline-block text-xs bg-purple-50 text-purple-600 px-2 py-0.5 rounded font-semibold mb-1">${p.category}</span>
            <h3 class="text-sm font-bold text-gray-900 line-clamp-2 leading-tight">${highlightMatch(p.name, currentQuery)}</h3>
            <p class="text-purple-700 font-bold text-sm mt-1">₹${p.price.toLocaleString('en-IN')}</p>
            <button onclick="event.stopPropagation(); addToCart('${p.id}')" class="mt-2 w-full text-xs bg-purple-600 text-white py-1.5 rounded-lg font-bold hover:bg-purple-700 transition-colors">
              + Add to Cart
            </button>
          </div>
        </div>
      `).join('');
    }

    function highlightMatch(text, query) {
      if (!query) return text;
      const re = new RegExp(`(${query})`, 'gi');
      return text.replace(re, '<mark class="bg-yellow-100 text-yellow-800 rounded px-0.5">$1</mark>');
    }

    // ─── Filters ───────────────────────────────────────────────────────────────
    window.setFilter = function(el, filter) {
      document.querySelectorAll('.filter-chip').forEach(c => c.classList.remove('active'));
      el.classList.add('active');
      activeFilter = filter;
      if (currentQuery) performSearch(currentQuery);
    };

    // ─── Recent Searches ───────────────────────────────────────────────────────
    function saveRecentSearch(q) {
      let recent = JSON.parse(localStorage.getItem('shopHubRecent') || '[]');
      recent = [q, ...recent.filter(r => r !== q)].slice(0, 8);
      localStorage.setItem('shopHubRecent', JSON.stringify(recent));
      renderRecentSearches();
    }

    function renderRecentSearches() {
      const recent = JSON.parse(localStorage.getItem('shopHubRecent') || '[]');
      const container = document.getElementById('recent-searches');
      const noRecent = document.getElementById('no-recent');
      if (recent.length === 0) {
        container.innerHTML = '';
        noRecent.classList.remove('hidden');
        return;
      }
      noRecent.classList.add('hidden');
      container.innerHTML = recent.map(r => `
        <button onclick="triggerSearch('${r}')" class="flex items-center gap-2 filter-chip">
          <i class="fas fa-history text-gray-400 text-xs"></i> ${r}
        </button>
      `).join('');
    }

    window.triggerSearch = function(q) {
      input.value = q;
      clearBtn.classList.remove('hidden');
      performSearch(q);
    };

    function showRecent() {
      document.getElementById('recent-section').classList.remove('hidden');
      document.getElementById('results-section').classList.add('hidden');
      document.getElementById('results-label').textContent = 'Enter a search term to find products';
    }

    window.clearSearch = function() {
      input.value = '';
      clearBtn.classList.add('hidden');
      currentQuery = '';
      currentResults = [];
      showRecent();
    };

    // ─── Add to Cart ───────────────────────────────────────────────────────────
    window.addToCart = function(productId) {
      const product = CATALOG.find(p => p.id === productId);
      if (!product) return;
      const cart = JSON.parse(localStorage.getItem('myShopCart') || '[]');
      cart.push({ id: product.id, name: product.name, price: product.price, image: product.image });
      localStorage.setItem('myShopCart', JSON.stringify(cart));
      updateCartBadge();
      // Brief visual feedback
      const btn = event.target;
      btn.textContent = '✓ Added!';
      btn.classList.replace('bg-purple-600', 'bg-green-600');
      setTimeout(() => {
        btn.textContent = '+ Add to Cart';
        btn.classList.replace('bg-green-600', 'bg-purple-600');
      }, 1200);
    };

    function updateCartBadge() {
      const cart = JSON.parse(localStorage.getItem('myShopCart') || '[]');
      document.getElementById('cart-badge').textContent = cart.length;
    }
  </script>
</body>
</html>
