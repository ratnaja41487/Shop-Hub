<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Create Account - ShopHub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
        body { font-family: 'Inter', sans-serif; }
    </style>
</head>
<body class="bg-purple-50 flex items-center justify-center min-h-screen py-12 px-4">
    <div class="bg-white p-8 rounded-2xl shadow-2xl w-full max-w-md border border-purple-100">
        <div class="text-center mb-8">
            <a href="home.html" class="text-2xl font-bold text-purple-700 flex justify-center items-center gap-2">
                <i class="fas fa-shopping-bag"></i> ShopHub
            </a>
            <h2 class="mt-4 text-2xl font-bold text-gray-900">Create your account</h2>
            <p class="text-gray-500 text-sm">Join thousands of shoppers and vendors.</p>
        </div>

        <form id="signupForm" class="space-y-4">
            <div>
                <label class="block text-sm font-semibold text-gray-700">Full Name</label>
                <input type="text" id="nameInput" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" placeholder="John Doe">
            </div>
            <div>
                <label class="block text-sm font-semibold text-gray-700">Email Address</label>
                <input type="email" required class="w-full mt-1 px-4 py-3 border border-gray-200 rounded-xl focus:ring-2 focus:ring-purple-500 outline-none" placeholder="john@example.com">
            </div>
            <div class="relative">
    <label class="block text-sm font-medium text-gray-700">Password</label>
    <input type="password" id="passwordInput" required class="w-full mt-1 px-4 py-3 border border-gray-300 rounded-lg focus:ring-purple-500 outline-none" placeholder="••••••••">
    <button type="button" onclick="togglePassword()" class="absolute right-3 top-10 text-gray-400">
        <i class="fas fa-eye" id="eyeIcon"></i>
    </button>
</div>

            <div class="bg-purple-50 p-4 rounded-xl flex items-center justify-between">
                <div>
                    <p class="text-sm font-bold text-purple-800">Become a Vendor?</p>
                    <p class="text-xs text-purple-600">I want to sell my own products.</p>
                </div>
                <input type="checkbox" class="w-5 h-5 accent-purple-600">
            </div>

            <button type="submit" class="w-full bg-purple-600 text-white py-4 rounded-xl font-bold text-lg hover:bg-purple-700 transition shadow-lg">Create Account</button>
        </form>

        <div class="mt-6 text-center">
            <p class="text-sm text-gray-600">Already have an account? <a href="login.html" class="font-bold text-purple-600 hover:underline">Login here</a></p>
            <a href="home.html" class="inline-block mt-4 text-xs text-gray-400 hover:text-purple-600 transition">← Back to Home</a>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', function(e) {
    e.preventDefault();
    
    const fullName = document.getElementById('nameInput').value;
    const email = document.querySelector('input[type="email"]').value;
    const password = document.querySelector('input[type="password"]').value;

    // Create a user object
    const userData = {
        name: fullName,
        email: email,
        password: password
    };

    // Save user data to localStorage using the email as the key
    localStorage.setItem(email, JSON.stringify(userData));
    
    alert("Account created successfully! Please login.");
    window.location.href = 'login.html'; // Send them to login first
});
    </script>
</body>
</html>
